openapi: 3.0.3
info:
  title: Take Water Delivery API
  description: |
    API for Take Water purified water delivery mobile app.
    Built with ASP.NET Core, consumed by React Native.

    ## Authentication
    All authenticated endpoints require `Authorization: Bearer <token>` header.
    Token is obtained from `/api/v1/login` and stored in `m_token` table.

    ## Database Tables
    - `m_units` — Product units (bottle, pack, etc.)
    - `m_products` — Product catalog with pricing
    - `m_customers` — Customer accounts
    - `m_staffs` — Staff accounts (admin/sales)
    - `t_orders` — Order headers
    - `t_order_details` — Order line items
    - `t_knowledge_posts` — Knowledge sharing articles
    - `m_regions` — Regions/States
    - `m_townships` — Townships/Districts
    - `m_token` — Auth tokens
  contact:
    name: Take Water Team
    email: dev@takewater.com
  version: 1.0.1
servers:
- url: https://virtserver.swaggerhub.com/test-6f3-d11/order-management/1.0.0
  description: SwaggerHub API Auto Mocking
- url: https://stoplight.io/mocks/takewater/takewater/1893361052
  description: Mock Server
tags:
- name: Auth
  description: "Registration, Login, Logout, Change Password"
- name: Products
  description: Product catalog
- name: Profile
  description: Customer profile management
- name: Orders
  description: Order placement and history
- name: Posts
  description: Knowledge sharing posts
- name: Regions
  description: Regions and townships
- name: Payment
  description: Payment methods and info
- name: Legal
  description: Privacy policy and terms
paths:
  /register:
    post:
      tags:
      - Auth
      summary: Customer Registration
      description: |
        Register a new customer account.
        Creates record in `m_customers` table.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /login:
    post:
      tags:
      - Auth
      summary: Customer Login
      description: |
        Authenticate with mobile_phone and password.
        Returns JWT token stored in `m_token` table.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /logout:
    post:
      tags:
      - Auth
      summary: Customer Logout
      description: |
        Invalidate current session token.
        Sets `is_active = 0` in `m_token` table.
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - bearerAuth: []
  /forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot Password (Two-step process)
      description: |
        **Step 1 — Verify identity:** Send `mobile_phone` + `name` (no password).
        Backend finds customer and returns `user_id`.

        **Step 2 — Reset password:** Send `user_id` + `password` (no phone/name).
        Backend updates password.

        Backend detects step by checking if `password` is provided.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
        required: true
      responses:
        "200":
          description: "Step 1: identity verified with user_id, or Step 2: password updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer not found (Step 1)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /change-password:
    post:
      tags:
      - Auth
      summary: Change Password
      description: |
        Change password for a customer.
        Requires `customer_id`, `new_password`, and `confirm_password`.
        Updates `m_customers.password` for the specified customer.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error (passwords don't match, customer not found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /products:
    get:
      tags:
      - Products
      summary: Get Product List (with pagination)
      description: |
        Get active products with unit info and pagination.
        Joins `m_products` with `m_units` for unit_name.
      parameters:
      - name: search
        in: query
        description: Search by product_name
        required: false
        schema:
          type: string
      - name: is_active
        in: query
        description: Filter by active status
        required: false
        schema:
          type: boolean
          default: true
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: limit
        in: query
        description: Items per page
        required: false
        schema:
          maximum: 50
          minimum: 1
          type: integer
          default: 10
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
  /profile:
    get:
      tags:
      - Profile
      summary: Get Customer Profile
      description: |
        Get current customer profile from `m_customers` table.
        Includes region and township info via FK joins.
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - bearerAuth: []
  /profile/update:
    put:
      tags:
      - Profile
      summary: Update Customer Profile
      description: |
        Update customer profile fields in `m_customers` table.
        Only provided fields are updated.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
        required: true
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - bearerAuth: []
  /orders:
    post:
      tags:
      - Orders
      summary: Create New Order
      description: |
        Place a new order. Creates record in `t_orders` and line items in `t_order_details`.
        Order status defaults to 1 (pending).
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
        required: true
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - bearerAuth: []
  /orders/customers/{customer_id}:
    get:
      tags:
      - Orders
      summary: Get Order History by Customer (with pagination & filter)
      description: |
        Get orders for a specific customer with pagination and status filter.
        Returns counts for each status tab (All, Pending, Confirm, Completed, Cancelled).
      parameters:
      - name: customer_id
        in: path
        description: Customer ID from `m_customers.id`
        required: true
        schema:
          type: integer
        example: 1
      - name: status
        in: query
        description: "Filter by status: 0=all, 1=pending, 2=confirm, 3=completed, 4=cancelled"
        required: false
        schema:
          type: integer
        example: 0
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: limit
        in: query
        description: Items per page
        required: false
        schema:
          maximum: 50
          minimum: 1
          type: integer
          default: 10
      responses:
        "200":
          description: Order history with pagination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - bearerAuth: []
  /orders/{id}:
    get:
      tags:
      - Orders
      summary: Get Order Detail
      description: |
        Get single order with line items.
        Joins `t_orders` with `t_order_details` and `m_products`.
      parameters:
      - name: id
        in: path
        description: Order ID from `t_orders.id`
        required: true
        schema:
          type: integer
        example: 1001
      - name: is_reorder
        in: query
        description: "if reorder request,is_reorder is true"
        required: true
        schema:
          type: boolean
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetailResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - bearerAuth: []
  /orders/{id}/cancel:
    put:
      tags:
      - Orders
      summary: Cancel Order
      description: |
        Cancel an order. Updates `order_status` to 4 (cancelled) in `t_orders`.
        Requires `cancel_reason`. Only pending/confirm orders can be cancelled.
      parameters:
      - name: id
        in: path
        description: Order ID from `t_orders.id`
        required: true
        schema:
          type: integer
        example: 1001
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelOrderRequest"
        required: true
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Order cannot be cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - bearerAuth: []
  /regions:
    get:
      tags:
      - Regions
      summary: Get Regions with Townships
      description: |
        Get all regions with their townships.
        Joins `m_regions` and `m_townships` tables.
      responses:
        "200":
          description: Regions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegionListResponse"
  /privacy-policy:
    get:
      tags:
      - Legal
      summary: Get Privacy Policy
      description: |
        Get privacy policy HTML content for mobile app display.
        Required for Google Play Store submission.
      responses:
        "200":
          description: Privacy policy content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyPolicyResponse"
  /payment-methods:
    get:
      tags:
      - Payment
      summary: Get Payment Methods
      description: |
        Get all available payment methods with info images.
        Images are hosted in wwwroot (static files).
      responses:
        "200":
          description: Payment methods list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethodListResponse"
  /posts:
    get:
      tags:
      - Posts
      summary: Get Knowledge Sharing Posts (with pagination)
      description: |
        Get active posts from `t_knowledge_posts` table with pagination.
      parameters:
      - name: search
        in: query
        description: Search by title
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          minimum: 1
          type: integer
          default: 1
      - name: limit
        in: query
        description: Items per page
        required: false
        schema:
          maximum: 50
          minimum: 1
          type: integer
          default: 10
      responses:
        "200":
          description: Posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"
components:
  schemas:
    LoginRequest:
      required:
      - mobile_phone
      - password
      type: object
      properties:
        mobile_phone:
          type: string
          description: Customer mobile phone (m_customers.mobile_phone)
          example: "09777123456"
        password:
          type: string
          description: Customer password (m_customers.password)
          format: password
          example: password123
    RegisterRequest:
      required:
      - gender
      - mobile_phone
      - name
      - password
      type: object
      properties:
        name:
          maxLength: 200
          minLength: 2
          type: string
          description: Customer name (m_customers.name)
          example: Ko Min Thura
        mobile_phone:
          pattern: "^09[0-9]{8,10}$"
          type: string
          description: Mobile phone (m_customers.mobile_phone)
          example: "09777123456"
        home_phone:
          maxLength: 100
          type: string
          description: Home phone (m_customers.home_phone)
          nullable: true
          example: "0123456"
        password:
          minLength: 6
          type: string
          description: Password (m_customers.password)
          format: password
          example: password123
        region_id:
          type: integer
          description: Region ID FK (m_customers.region_id → m_regions.id)
          nullable: true
          example: 1
        township_id:
          type: integer
          description: Township ID FK (m_customers.township_id → m_townships.id)
          nullable: true
          example: 1
        street_address:
          maxLength: 255
          type: string
          description: Street address (m_customers.street_address)
          nullable: true
          example: အမှတ် ၁၂၄၊ ပြည်ထောင်စုလမ်း
        dob:
          type: string
          description: Date of birth (m_customers.dob)
          format: date
          nullable: true
          example: 1998-05-15
        gender:
          type: integer
          description: "Gender: 1=male, 2=female (m_customers.gender)"
          example: 1
          enum:
          - 1
          - 2
        business_type:
          type: integer
          description: "Business type: 1=အိမ်သုံး, 2=ရုံးခန်း, 3=ဆိုင်/စားသောက်ဆိုင်, 4=အခြား (m_customers.business_type)"
          nullable: true
          example: 1
          enum:
          - 1
          - 2
          - 3
          - 4
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful
        data:
          $ref: "#/components/schemas/LoginResponse_data"
    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Registration successful
        data:
          $ref: "#/components/schemas/LoginResponse_data"
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation successful
    ForgotPasswordRequest:
      type: object
      properties:
        user_id:
          type: integer
          description: Customer ID (from Step 1 response) — required for Step 2
          nullable: true
          example: 1
        mobile_phone:
          type: string
          description: Customer phone (m_customers.mobile_phone) — required for Step 1
          nullable: true
          example: "09777123456"
        name:
          type: string
          description: Customer name (m_customers.name) — required for Step 1
          nullable: true
          example: Ko Min Thura
        password:
          minLength: 6
          type: string
          description: New password — required for Step 2
          format: password
          nullable: true
          example: newpass123
        confirm_password:
          minLength: 6
          type: string
          description: Confirm new password — required for Step 2
          format: password
          nullable: true
          example: newpass123
      description: |
        Single request for both steps:
        - Step 1 (verify): mobile_phone + name (no password)
        - Step 2 (reset): user_id + password (no phone/name)
    ForgotPasswordResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Identity verified
        data:
          $ref: "#/components/schemas/ForgotPasswordResponse_data"
      description: |
        Step 1 returns user_id. Step 2 returns success message.
    ChangePasswordRequest:
      type: object
      required:
      - customer_id
      - new_password
      - confirm_password
      properties:
        customer_id:
          type: integer
          description: Customer ID (m_customers.id)
          example: 1
        new_password:
          type: string
          description: New password (updated in m_customers.password)
          format: password
          minLength: 6
          example: newpass456
        confirm_password:
          type: string
          description: Confirm new password (must match new_password)
          format: password
          minLength: 6
          example: newpass456
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid credentials
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Field-level validation errors
          nullable: true
          example:
            mobile_phone:
            - Phone number is required
            password:
            - Password must be at least 6 characters
    Customer:
      type: object
      properties:
        id:
          type: integer
          description: m_customers.id (PK)
          example: 1
        name:
          type: string
          description: m_customers.name
          example: Ko Min Thura
        mobile_phone:
          type: string
          description: m_customers.mobile_phone
          example: "09777123456"
        home_phone:
          type: string
          description: m_customers.home_phone
          nullable: true
          example: "0123456"
        profile_image_path:
          type: string
          description: m_customers.profile_image_path
          nullable: true
          example: uploads/customers/1.jpg
        region_id:
          type: integer
          description: m_customers.region_id (FK → m_regions.id)
          nullable: true
          example: 1
        township_id:
          type: integer
          description: m_customers.township_id (FK → m_townships.id)
          nullable: true
          example: 1
        street_address:
          type: string
          description: m_customers.street_address
          nullable: true
          example: အမှတ် ၁၂၄၊ ပြည်ထောင်စုလမ်း
        dob:
          type: string
          description: m_customers.dob
          format: date
          nullable: true
          example: 1998-05-15
        gender:
          type: integer
          description: "m_customers.gender: 1=male, 2=female"
          example: 1
        business_type:
          type: integer
          description: "m_customers.business_type: 1=အိမ်သုံး, 2=ရုံးခန်း, 3=ဆိုင်, 4=အခြား"
          nullable: true
          example: 1
        is_active:
          type: integer
          description: m_customers.is_active
          example: 1
        created_datetime:
          type: string
          description: m_customers.created_datetime
          format: date-time
          example: 2026-01-15T08:30:00Z
      description: Customer record from m_customers table
    Product:
      type: object
      properties:
        id:
          type: integer
          description: m_products.id (PK)
          example: 1
        unit_id:
          type: integer
          description: m_products.unit_id (FK → m_units.id)
          nullable: true
          example: 1
        unit_name:
          type: string
          description: m_units.unit_name (joined)
          nullable: true
          example: bottle
        product_name:
          type: string
          description: m_products.product_name
          example: Take Premium Purified 20L
        product_code:
          type: string
          description: m_products.product_code
          nullable: true
          example: TP-20L-001
        product_image_path:
          type: string
          description: m_products.product_image_path
          nullable: true
          example: uploads/products/20l.jpg
        product_description:
          type: string
          description: m_products.product_description
          nullable: true
          example: Premium purified drinking water 20L bottle
        sale_price:
          type: number
          description: m_products.sale_price
          format: decimal
          example: 2500
        discount_amount:
          type: number
          description: m_products.discount_amount
          format: decimal
          example: 0
        discount_percent:
          type: integer
          description: m_products.discount_percent
          example: 0
        sale_discountprice:
          type: number
          description: m_products.sale_discountprice (final price after discount)
          format: decimal
          example: 2500
        is_active:
          type: integer
          description: m_products.is_active
          example: 1
        created_datetime:
          type: string
          description: m_products.created_datetime
          format: date-time
          example: 2026-01-10T08:00:00Z
      description: Product record from m_products table with unit join
    ProductListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
          description: Total products
          example: 20
        page:
          type: integer
          description: Current page
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 10
    ProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Customer"
    UpdateProfileRequest:
      type: object
      properties:
        name:
          maxLength: 200
          minLength: 2
          type: string
          description: m_customers.name
          example: Ko Min Thura
        home_phone:
          maxLength: 100
          type: string
          description: m_customers.home_phone
          nullable: true
          example: "0123456"
        profile_image_path:
          type: string
          description: m_customers.profile_image_path
          nullable: true
          example: uploads/customers/1.jpg
        region_id:
          type: integer
          description: m_customers.region_id (FK → m_regions.id)
          nullable: true
          example: 1
        township_id:
          type: integer
          description: m_customers.township_id (FK → m_townships.id)
          nullable: true
          example: 1
        street_address:
          maxLength: 255
          type: string
          description: m_customers.street_address
          nullable: true
          example: အမှတ် ၁၂၄၊ ပြည်ထောင်စုလမ်း
        dob:
          type: string
          description: m_customers.dob
          format: date
          nullable: true
          example: 1998-05-15
        gender:
          type: integer
          description: "m_customers.gender: 1=male, 2=female"
          example: 1
          enum:
          - 1
          - 2
        business_type:
          type: integer
          description: "m_customers.business_type: 1=အိမ်သုံး, 2=ရုံးခန်း, 3=ဆိုင်, 4=အခြား"
          nullable: true
          example: 1
          enum:
          - 1
          - 2
          - 3
          - 4
      description: All fields optional — only provided fields are updated
    CreateOrderRequest:
      required:
      - amount
      - items
      - phone_no
      - region_id
      - street_address
      - township_id
      type: object
      properties:
        amount:
          type: number
          description: t_orders.amount — total order amount (sum of price × quantity)
          format: decimal
          example: 5000
        region_id:
          type: integer
          description: t_orders.region_id (FK → m_regions.id) — delivery region
          example: 1
        township_id:
          type: integer
          description: t_orders.township_id (FK → m_townships.id) — delivery township
          example: 3
        street_address:
          maxLength: 255
          type: string
          description: t_orders.street_address — delivery street address
          example: အမှတ် ၁၂၄၊ ပြည်ထောင်စုလမ်း
        phone_no:
          maxLength: 100
          type: string
          description: t_orders.phone_no — delivery phone number
          example: "09777123456"
        remark:
          maxLength: 255
          type: string
          description: t_orders.remark — delivery instructions
          nullable: true
          example: အိမ်ရှေ့တံခါးမှာ ထားပေးပါ
        payment_type:
          type: integer
          description: "t_orders.payment_type: 1=CashDown, 2=WaveMoney, 3=KBZ Pay, 4=CB Pay"
          example: 1
          enum:
          - 1
          - 2
          - 3
          - 4
        payment_image_path:
          type: string
          description: t_orders.payment_image_path (for KBZ/Wave transfers)
          nullable: true
          example: uploads/payments/receipt1.jpg
        items:
          minItems: 1
          type: array
          description: Order line items (t_order_details)
          items:
            $ref: "#/components/schemas/CreateOrderRequest_items"
    CancelOrderRequest:
      required:
      - cancel_reason
      type: object
      properties:
        cancel_reason:
          maxLength: 500
          type: string
          description: t_orders.cancel_reason
          example: မှာယူလိုက်သည့်ပစ္စည်း မလိုတော့ပါ
    Order:
      type: object
      properties:
        id:
          type: integer
          description: t_orders.id (PK)
          example: 1001
        sale_person_id:
          type: integer
          description: t_orders.sale_person_id (FK → m_staffs.id)
          nullable: true
          example: 5
        order_number:
          type: string
          description: t_orders.order_number
          example: ORD-2026-001
        order_date:
          type: string
          description: t_orders.order_date
          format: date
          example: 2026-07-07
        remark:
          type: string
          description: t_orders.remark
          nullable: true
          example: အိမ်ရှေ့တံခါးမှာ ထားပေးပါ
        amount:
          type: number
          description: t_orders.amount (total order amount)
          format: decimal
          example: 5000
        payment_type:
          type: integer
          description: "t_orders.payment_type: 1=CashDown, 2=WaveMoney, 3=KBZ Pay, 4=CB Pay"
          example: 1
          enum:
          - 1
          - 2
          - 3
          - 4
        payment_type_name:
          type: integer
          description: "t_orders.payment_type: 1=CashDown, 2=WaveMoney, 3=KBZ Pay, 4=CB Pay"
          example: 1
          enum:
          - 1
          - 2
          - 3
          - 4
        order_status:
          type: integer
          description: "t_orders.order_status: 1=pending, 2=confirm, 3=completed, 4=cancelled"
          example: 1
          enum:
          - 1
          - 2
          - 3
          - 4
        order_status_text:
          type: string
          description: Human-readable status
          example: pending
        cancel_reason:
          type: string
          description: t_orders.cancel_reason
          nullable: true
        payment_image_path:
          type: string
          description: t_orders.payment_image_path
          nullable: true
        customer_id:
          type: integer
          description: t_orders.customer_id (FK → m_customers.id)
          example: 1
        region_id:
          type: integer
          description: t_orders.region_id (FK → m_regions.id)
          nullable: true
          example: 1
        township_id:
          type: integer
          description: t_orders.township_id (FK → m_townships.id)
          nullable: true
          example: 1
        street_address:
          type: string
          description: t_orders.street_address
          example: အမှတ် ၁၂၄၊ ပြည်ထောင်စုလမ်း
        phone_no:
          type: string
          description: t_orders.phone_no
          example: "09777123456"
        items:
          type: array
          description: Order line items (t_order_details + m_products)
          items:
            $ref: "#/components/schemas/OrderItem"
        created_datetime:
          type: string
          description: t_orders.created_datetime
          format: date-time
          example: 2026-07-07T10:30:00Z
        updated_datetime:
          type: string
          description: t_orders.updated_datetime
          format: date-time
          nullable: true
          example: 2026-07-07T11:00:00Z
      description: Order record from t_orders table with items
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          description: t_order_details.id (PK)
          example: 1
        order_id:
          type: integer
          description: t_order_details.order_id (FK → t_orders.id)
          example: 1001
        product_id:
          type: integer
          description: t_order_details.product_id (FK → m_products.id)
          example: 1
        product_name:
          type: string
          description: Product name (joined from m_products)
          example: Take Premium Purified 20L
        price:
          type: number
          description: t_order_details.price
          format: decimal
          example: 2500
        quantity:
          type: integer
          description: t_order_details.quantity
          example: 2
        subtotal:
          type: number
          description: "Calculated: price × quantity"
          example: 5000
      description: Order line item from t_order_details table
    OrderResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Order created successfully
        data:
          $ref: "#/components/schemas/Order"
    OrderDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Order"
    OrderListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
          description: Total orders for current filter
          example: 25
        page:
          type: integer
          description: Current page
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 10
        counts:
          $ref: "#/components/schemas/OrderListResponse_counts"
    Township:
      type: object
      properties:
        id:
          type: integer
          description: m_townships.id (PK)
          example: 1
        region_id:
          type: integer
          description: m_townships.region_id (FK → m_regions.id)
          example: 1
        township_name:
          type: string
          description: m_townships.township_name
          example: ဗိုလ်တထောင်
      description: Township record from m_townships table
    Region:
      type: object
      properties:
        id:
          type: integer
          description: m_regions.id (PK)
          example: 1
        region_name:
          type: string
          description: m_regions.region_name
          example: ရန်ကုန်
        townships:
          type: array
          description: Townships in this region
          items:
            $ref: "#/components/schemas/Township"
      description: Region record from m_regions table with townships
    RegionListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Region"
    PrivacyPolicyResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/PrivacyPolicyResponse_data"
    PaymentMethod:
      type: object
      properties:
        id:
          type: integer
          description: Payment method ID
          example: 1
        name:
          type: string
          description: Payment method name
          example: KBZ Pay
        description:
          type: string
          description: Payment method description
          nullable: true
          example: KBZ Pay ဖြင့် ငွေပေးချေနိုင်ပါသည်
        image_url:
          type: string
          description: Info image URL (from wwwroot/images/payment/)
          example: /images/payment/kbzpay-qr.png
        is_active:
          type: integer
          description: "1=active, 0=inactive"
          example: 1
      description: Payment method with info image
    PaymentMethodListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaymentMethod"
    Post:
      type: object
      properties:
        id:
          type: integer
          description: t_knowledge_posts.id (PK)
          example: 1
        title:
          type: string
          description: t_knowledge_posts.title
          example: ရေသန့်စင်ပြီးသောက်ရေ၏ အကျိုးကျေးဇူးများ
        content:
          type: string
          description: t_knowledge_posts.content
          example: သန့်စင်ပြီးသောက်ရေသည် ကျန်းမာရေးအတွက် အရေးကြီးပါသည်...
        image_path:
          type: string
          description: t_knowledge_posts.image_path
          nullable: true
          example: uploads/posts/hydration.jpg
        created_datetime:
          type: string
          description: t_knowledge_posts.created_datetime
          format: date-time
          example: 2026-07-01T09:00:00Z
      description: Knowledge post from t_knowledge_posts table
    PostListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: integer
          description: Total posts
          example: 15
        page:
          type: integer
          description: Current page
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 10
    LoginResponse_data:
      type: object
      properties:
        token:
          type: string
          description: JWT token (m_token.access_token)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        customer:
          $ref: "#/components/schemas/Customer"
    ForgotPasswordResponse_data:
      type: object
      properties:
        user_id:
          type: integer
          description: Customer ID for Step 2
          example: 1
      description: Only returned in Step 1
      nullable: true
    CreateOrderRequest_items:
      required:
      - price
      - product_id
      - quantity
      type: object
      properties:
        product_id:
          type: integer
          description: t_order_details.product_id (FK → m_products.id)
          example: 1
        price:
          type: number
          description: t_order_details.price (unit price at time of order)
          format: decimal
          example: 2500
        quantity:
          minimum: 1
          type: integer
          description: t_order_details.quantity
          example: 2
    OrderListResponse_counts:
      type: object
      properties:
        all:
          type: integer
          description: Total orders (all statuses)
          example: 25
        pending:
          type: integer
          description: Status 1 count
          example: 5
        confirm:
          type: integer
          description: Status 2 count
          example: 3
        completed:
          type: integer
          description: Status 3 count
          example: 12
        cancelled:
          type: integer
          description: Status 4 count
          example: 5
      description: Order counts for each status tab
    PrivacyPolicyResponse_data:
      type: object
      properties:
        title:
          type: string
          description: Privacy policy title
          example: Privacy Policy
        content:
          type: string
          description: HTML content for privacy policy
          example: <h1>Privacy Policy</h1><p>Take Water App...</p>
        last_updated:
          type: string
          description: Last updated date
          example: 2026-07-07
  securitySchemes:
    bearerAuth:
      type: http
      description: JWT token from login response (stored in m_token.access_token)
      scheme: bearer
      bearerFormat: JWT
